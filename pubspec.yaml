name: offline_face_recognition

description: Offline face recognition for Flutter using Google ML Kit for face detection and TensorFlow Lite for embedding extraction and matching.

version: 0.1.0

homepage: https://github.com/osama-sn/offline_face_recognition
repository: https://github.com/osama-sn/offline_face_recognition
issue_tracker: https://github.com/osama-sn/offline_face_recognition/issues

topics:
  - face-recognition
  - face-detection
  - tensorflow-lite
  - biometric-authentication
  - machine-learning

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.10.5+9
  google_mlkit_face_detection: ^0.12.0
  image: ^4.3.0
  path: ^1.9.0
  path_provider: ^2.1.3
  sqflite: ^2.3.2
  tflite_flutter: ^0.11.0

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  assets:
    - assets/mobile_face_net.tflite

screenshots:
  - description: Live face recognition example
    path: screenshots/demo.jpeg