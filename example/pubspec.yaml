name: offline_face_recognition_example
description: Example app for offline_face_recognition.
publish_to: none

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  camera: ^0.10.5+9
  flutter:
    sdk: flutter
  google_mlkit_face_detection: ^0.12.0
  image: ^4.3.0
  image_picker: ^1.0.8
  offline_face_recognition:
    path: ..
  path_provider: ^2.1.3

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/face_shape.png
